<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="css/global.css">
    <title>CodeCenter</title>
</head>

<body class="body-cliente">

    <header data-nav="clientes"></header>

    <div class="contenedor-principal">

        <div class="cabecera-seccion">
            <h2 class="titulo-reserva">Actividades disponibles:</h2>
            
            <div class="buscador-filtro">
                <span class="material-symbols-outlined icono-lupa">search</span>
                <input type="text" id="buscador-deporte" placeholder="¿Qué deporte quieres practicar hoy?">
            </div>
        </div>
        
        

        <div class="grid-reservas">
            
            <div class="tarjeta-clicable padel" data-deporte="padel">
                <img src="img/padel.png" alt="Pádel">
                <h2>PÁDEL</h2>
            </div>

            <div class="tarjeta-clicable tenis" data-deporte="tenis">
                <img src="img/tenis.png" alt="Tenis">
                <h2>TENIS</h2>
            </div>

            <div class="tarjeta-clicable correr" data-deporte="correr">
                <img src="img/correr.png" alt="Correr">
                <h2>PISTA ATLETISMO</h2>
            </div>

            <div class="tarjeta-clicable spinning" data-deporte="spinning">
                <img src="img/spinning.png" alt="Spinning">
                <h2>SPINNING</h2>
            </div>

            <div class="tarjeta-clicable boxeo" data-deporte="boxeo">
                <img src="img/boxeo.png" alt="Boxeo">
                <h2>BOXEO</h2>
            </div>

            <div class="tarjeta-clicable funcional" data-deporte="funcional">
                <img src="img/funcional.png" alt="Funcional">
                <h2>FUNCIONAL</h2>
            </div>

            <div class="tarjeta-clicable crosTra" data-deporte="crosTra">
                <img src="img/crossTra.png" alt="Cross trainnning">
                <h2>TRAINNING</h2>
            </div>

            <div class="tarjeta-clicable pesas" data-deporte="pesas">
                <img src="img/pesa.png" alt="Pesas">
                <h2>SALA DE FITNESS</h2>
            </div>

            <div class="tarjeta-clicable nadar" data-deporte="nadar">
                <img src="img/nadar.png" alt="Nadar">
                <h2>NATACIÓN</h2>
            </div>

            <div class="tarjeta-clicable futbol" data-deporte="futbol">
                <img src="img/futbol.png" alt="Fútbol">
                <h2>FÚTBOL</h2>
            </div>

            <div class="tarjeta-clicable basket" data-deporte="basket">
                <img src="img/baloncesto.png" alt="Baloncesto">
                <h2>BASKET</h2>
            </div>

            <div class="tarjeta-clicable voley" data-deporte="voley">
                <img src="img/voley.png" alt="Voley">
                <h2>VOLEY</h2>
            </div>
        </div>
    </div>

    <footer></footer>

  <script src="js/componentes.js"></script>

    <script src="js/script.js"></script>
    
</body>

</html>
